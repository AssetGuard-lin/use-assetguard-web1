<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Credit Ledger - AssetGuard Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #001A35; --accent: #f59e0b; --success: #22c55e; --danger: #ef4444; --bg: #f4f6f9; --glass: rgba(255, 255, 255, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1e293b; padding-bottom: 80px; }

        .header { position: sticky; top: 0; z-index: 1000; background: var(--glass); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; padding: 15px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .brand { font-weight: 800; font-size: 16px; color: var(--primary); }
        .brand span { color: var(--accent); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 16px; border-left: 4px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .stat-card label { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; }
        .stat-card span { font-size: 16px; font-weight: 800; color: var(--primary); }

        .filter-group { display: flex; gap: 8px; }
        select, .search-bar { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 12px; font-weight: 700; background: white; outline: none; }

        .report-container { padding: 15px; }
        .debt-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 12px; overflow: hidden; }
        .debt-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .cust-info h3 { margin: 0; font-size: 14px; font-weight: 800; text-transform: uppercase; color: var(--primary); }
        
        .debt-amount { text-align: right; }
        .amt-due { display: block; font-size: 15px; font-weight: 800; color: var(--danger); }
        
        .debt-body { padding: 0 18px 18px; display: none; border-top: 1px dashed #f1f5f9; background: #fafafa; }
        .log-row { display: flex; justify-content: space-between; font-size: 10px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }

        .sticky-footer { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--primary); color: white; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header class="header">
    <div class="nav-top">
        <div class="brand">CREDIT<span> LEDGER</span></div>
        <div style="font-size: 9px; font-weight: 800; color: var(--success);"></div>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><label>Total Debt</label><span id="stat-total-debt">KES 0</span></div>
        <div class="stat-card" style="border-left-color: var(--primary);"><label>Active Debtors</label><span id="stat-count">0</span></div>
    </div>
    <div class="filter-group">
        <input type="text" class="search-bar" id="searchCust" placeholder="Search customer..." oninput="renderReport()">
        <select id="fMonth" onchange="renderReport()"></select>
        <select id="fYear" onchange="renderReport()"></select>
    </div>
</header>

<div class="report-container" id="reportList"></div>

<div class="sticky-footer">
    <div><small style="font-size: 8px; opacity: 0.6; text-transform: uppercase;">Outstanding Total</small><div id="foot-total" style="font-size: 20px; font-weight: 800; color: var(--accent);">KES 0</div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com" }));
    const currentUID = localStorage.getItem("ag_active_uid");
    
    let debtors = [];

    const loadData = () => {
        onValue(ref(db, `users/${currentUID}/sales`), (snap) => {
            const data = snap.val() || {};
            debtors = Object.entries(data)
                .filter(([_, v]) => v.payment === "Credit")
                .map(([id, v]) => ({ id, ...v }));
            renderReport();
        });
    };

    window.renderReport = () => {
        const list = document.getElementById('reportList');
        const search = document.getElementById('searchCust').value.toLowerCase();
        const m = document.getElementById('fMonth').value;
        const y = document.getElementById('fYear').value;
        
        list.innerHTML = '';
        let totalVal = 0, count = 0;

        debtors.forEach(d => {
            const date = new Date(d.timestamp);
            if(date.getMonth().toString() !== m || date.getFullYear().toString() !== y) return;
            if(!d.customer.toLowerCase().includes(search)) return;

            const totalInvoice = d.items ? d.items.reduce((s, i) => s + parseFloat(i.total), 0) : parseFloat(d.total || 0);
            const totalPaid = d.payments ? Object.values(d.payments).reduce((s, p) => s + parseFloat(p.amount), 0) : 0;
            const balance = totalInvoice - totalPaid;

            if(balance <= 0) return;

            totalVal += balance;
            count++;

            const logs = d.payments ? Object.values(d.payments).map(p => `
                <div class="log-row">
                    <span style="font-weight:600; color:#64748b;">${new Date(p.date).toLocaleDateString()}</span>
                    <span style="color:var(--success); font-weight:800;">+${parseFloat(p.amount).toLocaleString()}</span>
                </div>
            `).join('') : '<p style="font-size:10px; color:#94a3b8; text-align:center; padding:10px;">No payments recorded.</p>';

            list.innerHTML += `
                <div class="debt-card">
                    <div class="debt-header" onclick="toggleCard('${d.id}')">
                        <div class="cust-info">
                            <h3>${d.customer}</h3>
                            <p style="font-size:10px; font-weight:600; color:#94a3b8;">Ref: ${d.id.slice(-6).toUpperCase()}</p>
                        </div>
                        <div class="debt-amount">
                            <span class="amt-due">KES ${balance.toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="debt-body" id="body-${d.id}">
                        <div style="font-size:9px; font-weight:800; color:var(--primary); margin-bottom:8px;">PAYMENT HISTORY</div>
                        ${logs}
                    </div>
                </div>
            `;
        });

        document.getElementById('stat-total-debt').innerText = `KES ${totalVal.toLocaleString()}`;
        document.getElementById('stat-count').innerText = count;
        document.getElementById('foot-total').innerText = `KES ${totalVal.toLocaleString()}`;
    };

    window.toggleCard = (id) => {
        const b = document.getElementById('body-'+id);
        b.style.display = b.style.display === 'block' ? 'none' : 'block';
    };

    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const d = new Date();
    document.getElementById('fMonth').innerHTML = months.map((m, i) => `<option value="${i}" ${i===d.getMonth()?'selected':''}>${m}</option>`).join('');
    document.getElementById('fYear').innerHTML = [2025, 2026].map(y => `<option value="${y}" ${y===d.getFullYear()?'selected':''}>${y}</option>`).join('');

    if(currentUID) loadData();
</script>
</body>
</html>
