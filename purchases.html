<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AssetGuard Pro | Purchase Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #059669; --danger: #e11d48; --dark: #064e3b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .navbar { background: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .view-container { display: none; padding: 20px; max-width: 450px; margin: 0 auto; }
        .view-container.active { display: block; }
        .toggle-btn { background: var(--dark); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 16px; }
        .summary-card { background: var(--dark); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #f1f5f9; background: #f8fafc; font-size: 14px; font-weight: 600; outline: none; box-sizing: border-box; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 280px; text-align: center; }
        .btn-small { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 12px; color: white; }
        .history-item { background: white; padding: 16px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
    </style>
</head>
<body>

    <div id="pinModal" class="modal-overlay">
        <div class="modal">
            <h3 style="margin-top:0;">Secure Access</h3>
            <input type="password" id="pinInput" placeholder="PIN" maxlength="4" style="text-align:center; font-size: 20px; letter-spacing: 5px;">
            <div id="pinError" style="color:var(--danger); font-size:11px; margin-top:10px; font-weight:700;"></div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
                <button class="btn-small" style="background:#64748b;" onclick="closePinModal()">Cancel</button>
                <button class="btn-small" style="background:var(--primary);" onclick="submitPin()">Submit</button>
            </div>
        </div>
    </div>
    
    <header class="navbar">
        <div style="font-size: 12px; font-weight: 800; color: var(--dark);">PURCHASE TERMINAL</div>
        <button class="toggle-btn" id="toggleViewBtn" onclick="toggleView()">View Ledger</button>
    </header>

    <div id="view-entry" class="view-container active">
        <div class="card">
            <h2 id="formTitle" style="margin-top:0; font-size: 18px;">New Purchase Entry</h2>
            <form id="purchaseForm">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Item Name</label><input type="text" id="item_name" required></div>
                <div class="form-group"><label>Supplier</label><input type="text" id="supplier" required></div>
                <div class="row" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group"><label>Quantity</label><input type="number" id="qty" required></div>
                    <div class="form-group"><label>Unit</label><select id="unit"><option value="kg">kg</option><option value="pcs">pcs</option><option value="liters">liters</option></select></div>
                </div>
                <div class="form-group"><label>Total Cost (KES)</label><input type="number" id="amount" step="0.01" required></div>
                <button type="submit" id="submitBtn" class="btn-small" style="background:var(--primary); width:100%; padding:15px; font-size: 14px;">Record Purchase</button>
            </form>
        </div>
    </div>

    <div id="view-ledger" class="view-container">
        <div class="summary-card">
            <label style="color:rgba(255,255,255,0.6)">Total Spending</label>
            <div id="totalSpend" style="font-size: 28px; font-weight: 800;">KES 0.00</div>
        </div>
        <div class="form-group"><label>Search Supplier</label><input type="text" id="searchSupplier" placeholder="Search..." oninput="refreshLedger()"></div>
        <div id="historyList"></div>
    </div>

    <div id="view-detail" class="view-container">
        <div class="card">
            <div id="detailContent" style="margin-top:20px;"></div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:30px;">
                <button class="btn-small" style="background:#fee2e2; color:#e11d48;" id="delBtn">Delete</button>
                <button class="btn-small" style="background:#e2e8f0; color:#1e293b;" id="editBtn">Edit</button>
            </div>
            <button class="btn-small" style="background:transparent; color:#94a3b8; border:1px solid #e2e8f0; margin-top:30px; width:100%;" onclick="showView('view-ledger')">Back to Ledger</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // --- BROWSER STORAGE PERSISTENCE LAYER ---
        // Request the browser to mark all site storage (IndexedDB & LocalStorage) as persistent
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                if (granted) {
                    console.log("Storage persistence granted! Local databases protected from auto-clearing.");
                } else {
                    console.log("Storage persistence requested but denied by browser policies.");
                }
            });
        }

        const app = initializeApp({ databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com" });
        const db = getDatabase(app);
        const currentUID = localStorage.getItem("ag_active_uid") || "global_user";
        const cloudPath = `users/${currentUID}/purchases`;
        const ADMIN_PASS = "1234";

        let localPurchases = [];

        // --- PER-USER OFFLINE STORAGE (IndexedDB) ---
        const idbRequest = indexedDB.open(`AssetGuard_Purchases_${currentUID}`, 1);
        idbRequest.onupgradeneeded = e => e.target.result.createObjectStore("purchases", { keyPath: "id" });

        // Helper to save/update a single purchase locally
        const localSaveSingle = (purchase) => {
            return new Promise((resolve) => {
                if (!idbRequest.result) return resolve();
                const tx = idbRequest.result.transaction("purchases", "readwrite");
                const store = tx.objectStore("purchases");
                store.put(purchase);
                tx.oncomplete = () => resolve();
            });
        };

        // Helper to load purchases from IndexedDB and render them
        const loadAndRenderLocal = () => {
            return new Promise((resolve) => {
                if (!idbRequest.result) return resolve();
                const tx = idbRequest.result.transaction("purchases", "readonly");
                tx.objectStore("purchases").getAll().onsuccess = e => {
                    refreshLedger(e.target.result);
                    resolve();
                };
            });
        };

        // Sync Engine: Pushes pending local changes/deletions to Firebase Realtime Database
        async function syncUnsyncedPurchases() {
            if (!idbRequest.result) return;

            const tx = idbRequest.result.transaction("purchases", "readonly");
            tx.objectStore("purchases").getAll().onsuccess = async (e) => {
                const allItems = e.target.result;
                const unsynced = allItems.filter(p => p.synced === false);
                const toDelete = allItems.filter(p => p.deleted === true);

                // 1. Process pending offline creations & edits
                for (const item of unsynced) {
                    try {
                        await update(ref(db, `${cloudPath}/${item.id}`), {
                            id: item.id,
                            item_name: item.item_name,
                            supplier: item.supplier,
                            quantity: item.quantity,
                            amount: item.amount,
                            unit: item.unit,
                            timestamp: item.timestamp
                        });
                        item.synced = true;
                        await localSaveSingle(item);
                    } catch (err) {
                        console.log("Sync skipped/failed for purchase: ", item.id, err);
                    }
                }

                // 2. Process pending offline deletions
                for (const item of toDelete) {
                    try {
                        await remove(ref(db, `${cloudPath}/${item.id}`));
                        if (idbRequest.result) {
                            const delTx = idbRequest.result.transaction("purchases", "readwrite");
                            delTx.objectStore("purchases").delete(item.id);
                        }
                    } catch (err) {
                        console.log("Sync delete failed for purchase: ", item.id, err);
                    }
                }

                if (unsynced.length > 0 || toDelete.length > 0) {
                    loadAndRenderLocal();
                }
            };
        }

        idbRequest.onsuccess = () => {
            // Render local data first
            loadAndRenderLocal();
            // Fire sync check on load
            syncUnsyncedPurchases();

            // Listen for remote modifications
            onValue(ref(db, cloudPath), async (snap) => {
                const serverData = snap.val() || {};

                // Get local IndexedDB to preserve locally unsynced creations and deletions
                const tx = idbRequest.result.transaction("purchases", "readwrite");
                const store = tx.objectStore("purchases");

                store.getAll().onsuccess = (e) => {
                    const localList = e.target.result;
                    const unsyncedItems = localList.filter(p => p.synced === false);
                    const deletedItems = localList.filter(p => p.deleted === true);

                    // Re-instantiate database with clear transition
                    const clearTx = idbRequest.result.transaction("purchases", "readwrite");
                    const clearStore = clearTx.objectStore("purchases");
                    clearStore.clear();

                    // Re-insert synchronized server records (ignoring any soft-deleted offline records)
                    Object.entries(serverData).forEach(([id, val]) => {
                        if (!deletedItems.some(di => di.id === id)) {
                            clearStore.put({ id, ...val, synced: true });
                        }
                    });

                    // Hold onto local unsynced edits/creations
                    unsyncedItems.forEach(item => {
                        clearStore.put(item);
                    });

                    // Hold onto pending soft deletions
                    deletedItems.forEach(item => {
                        clearStore.put(item);
                    });

                    clearTx.oncomplete = () => {
                        loadAndRenderLocal();
                    };
                };
            });
        };

        window.showView = (id) => {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('toggleViewBtn').innerText = (id === 'view-ledger') ? "New Entry" : "View Ledger";
        };

        window.toggleView = () => (document.getElementById('view-entry').classList.contains('active')) ? showView('view-ledger') : showView('view-entry');
        
        window.closePinModal = () => {
            document.getElementById('pinModal').style.display = 'none';
            document.getElementById('pinError').innerText = "";
            document.getElementById('pinInput').value = "";
        };

        window.refreshLedger = (data) => {
            if (data) {
                localPurchases = Array.isArray(data) ? data : Object.entries(data).map(([id, val]) => ({ id, ...val }));
            }

            const list = document.getElementById('historyList');
            const search = document.getElementById('searchSupplier').value.toLowerCase();
            let total = 0;
            let htmlBuffer = '';

            // Filter out deleted items & sort by newest timestamp
            const activePurchases = localPurchases.filter(p => !p.deleted);
            activePurchases.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            
            activePurchases.forEach(val => {
                if (val && val.supplier && val.supplier.toLowerCase().includes(search)) {
                    total += parseFloat(val.amount || 0);
                    htmlBuffer += `<div class="history-item" onclick="viewDetails('${val.id}')"><div><b>${val.item_name}</b><br><small>${val.supplier}</small></div><div><b>KES ${parseFloat(val.amount).toLocaleString()}</b></div></div>`;
                }
            });
            list.innerHTML = htmlBuffer;
            document.getElementById('totalSpend').innerText = `KES ${total.toLocaleString()}`;
        };

        window.viewDetails = (id) => {
            const item = localPurchases.find(p => p.id === id);
            if(!item) return;

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-row"><label>Item</label><b>${item.item_name}</b></div>
                <div class="detail-row"><label>Supplier</label><b>${item.supplier}</b></div>
                <div class="detail-row"><label>Quantity</label><b>${item.quantity} ${item.unit}</b></div>
                <div class="detail-row"><label>Cost</label><b>KES ${parseFloat(item.amount).toLocaleString()}</b></div>`;
            
            document.getElementById('delBtn').onclick = () => {
                document.getElementById('pinModal').style.display = 'flex';
                window.submitPin = async () => {
                    if(document.getElementById('pinInput').value === ADMIN_PASS) {
                        closePinModal();

                        // Soft delete locally
                        item.deleted = true;
                        await localSaveSingle(item);
                        await loadAndRenderLocal();
                        showView('view-ledger');

                        try {
                            await remove(ref(db, `${cloudPath}/${id}`));
                            // If successful on the network, remove completely from IDB
                            if (idbRequest.result) {
                                const tx = idbRequest.result.transaction("purchases", "readwrite");
                                tx.objectStore("purchases").delete(id);
                            }
                        } catch (e) {
                            console.log("Offline: Deleted registered locally. Syncing deletion later.");
                        }
                    } else { 
                        document.getElementById('pinError').innerText = "incorrect pin"; 
                    }
                };
            };
            
            document.getElementById('editBtn').onclick = () => {
                document.getElementById('pinModal').style.display = 'flex';
                window.submitPin = () => {
                    if(document.getElementById('pinInput').value === ADMIN_PASS) {
                        document.getElementById('editId').value = id;
                        document.getElementById('item_name').value = item.item_name;
                        document.getElementById('supplier').value = item.supplier;
                        document.getElementById('qty').value = item.quantity;
                        document.getElementById('amount').value = item.amount;
                        document.getElementById('unit').value = item.unit;
                        document.getElementById('formTitle').innerText = "Edit Entry";
                        showView('view-entry');
                        closePinModal();
                    } else { 
                        document.getElementById('pinError').innerText = "incorrect pin"; 
                    }
                };
            };
            showView('view-detail');
        };

        document.getElementById('purchaseForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value || `pur_${Date.now()}`;
            const entry = { 
                id, 
                item_name: document.getElementById('item_name').value, 
                supplier: document.getElementById('supplier').value, 
                quantity: document.getElementById('qty').value, 
                amount: document.getElementById('amount').value, 
                unit: document.getElementById('unit').value, 
                timestamp: document.getElementById('editId').value ? (localPurchases.find(p => p.id === id)?.timestamp || Date.now()) : Date.now(),
                synced: false 
            };
            
            // Immediately store in IndexedDB and refresh interface
            await localSaveSingle(entry);
            await loadAndRenderLocal();
            
            // Clear inputs
            document.getElementById('purchaseForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formTitle').innerText = "New Purchase Entry";
            showView('view-ledger');

            // Attempt online save in the background
            try {
                await update(ref(db, `${cloudPath}/${id}`), {
                    id: entry.id,
                    item_name: entry.item_name,
                    supplier: entry.supplier,
                    quantity: entry.quantity,
                    amount: entry.amount,
                    unit: entry.unit,
                    timestamp: entry.timestamp
                });
                entry.synced = true;
                await localSaveSingle(entry);
                await loadAndRenderLocal();
            } catch (err) {
                console.log("Offline: Purchase saved locally. Will sync when connection is restored.");
            }
        };

        // Try syncing automatically when returning to online state
        window.addEventListener('online', syncUnsyncedPurchases);
        loadAndRenderLocal();
    </script>
</body>
</html>
