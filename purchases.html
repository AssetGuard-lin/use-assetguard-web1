<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Purchase Entry | AssetGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0072CE; --dark: #001A35; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }

        .navbar { background: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .main-container { max-width: 450px; margin: 30px auto; padding: 0 20px; }
        .entry-card { background: white; padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        
        .form-group { margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; background: #f8fafc; font-size: 14px; font-weight: 600; outline: none; box-sizing: border-box; }
        
        .submit-btn { width: 100%; padding: 16px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-size: 12px; font-weight: 800; color: var(--dark);">PURCHASE LOG</div>
        <a href="purchases_history.html" style="font-size: 10px; font-weight: 800; color: var(--primary); text-decoration: none;">HISTORY</a>
    </div>

    <div class="main-container">
        <div class="entry-card">
            <h2 style="margin-top:0;">New Purchase</h2>
            <form id="purchaseForm">
                <div class="form-group">
                    <label>Date</label>
                    <input type="datetime-local" id="purchase_date" required>
                </div>
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="item_name" required>
                </div>
                <div class="form-group">
                    <label>Supplier</label>
                    <input type="text" id="supplier" required>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="qty" required>
                    </div>
                    <div class="form-group">
                        <label>Unit</label>
                        <select id="unit">
                            <option value="kg">kg</option>
                            <option value="gms">gms</option>
                            <option value="cm">cm</option>
                            <option value="meters">meters</option>
                            <option value="pcs">pcs</option>
                            <option value="liters">liters</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Total Cost (KES)</label>
                    <input type="number" id="amount" step="0.01" required>
                </div>
                <button type="submit" class="submit-btn">Record Purchase</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com" }));
        const currentUID = localStorage.getItem("ag_active_uid");
        const cloudPath = `users/${currentUID}/purchases`;

        document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                id: "pur_" + Date.now(),
                item_name: document.getElementById('item_name').value,
                supplier: document.getElementById('supplier').value,
                quantity: document.getElementById('qty').value,
                unit: document.getElementById('unit').value,
                amount: document.getElementById('amount').value,
                purchase_date: document.getElementById('purchase_date').value,
                timestamp: Date.now()
            };

            try {
                await set(ref(db, `${cloudPath}/${data.id}`), data);
                alert("Purchase Recorded Successfully");
                document.getElementById('purchaseForm').reset();
            } catch (err) {
                alert("Error: " + err.message);
            }
        });
    </script>
</body>
</html>
