<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AssetGuard Pro - Unified Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    :root { --primary: #0072CE; --dark: #001A35; --edit: #f59e0b; --light: #f8faff; --locked: #e2e8f0; --error: #ef4444; --success: #22c55e; --bg: #f4f6f9; --danger:#ef4444; --muted:#64748b; --warning: #f59e0b; }
    body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background: var(--bg); color: #1f2937; }
    .header-nav { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 20px; z-index: 3000; border-bottom: 1px solid #e2e8f0; }
    .brand { font-weight: 800; font-size: 16px; color: var(--dark); }
    .brand span { color: var(--primary); }
    .toggle-view-btn { background: var(--dark); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    .toggle-view-btn:hover { background: var(--primary); }
    .view-container { display: none; padding: 15px; }
    .view-container.active { display: block; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f0f2f5; }
    #syncStatus { display: none; text-align: center; padding: 8px; border-radius: 10px; margin-bottom: 15px; font-weight: 700; font-size: 11px; text-transform: uppercase; }
    .status-offline { background: #fee2e2; color: var(--error); border: 1px solid #fecaca; }
    .status-syncing { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
    h2 { text-align: center; color: var(--dark); margin-bottom: 20px; font-weight: 700; }
    label { display: block; margin-top: 10px; font-weight: 700; color: var(--dark); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #f0f2f5; border-radius: 10px; box-sizing: border-box; background: #f9fbff; transition: 0.3s; font-family: inherit; }
    .valid-kenya { border-color: var(--success) !important; background: #f0fff4 !important; }
    .invalid-kenya { border-color: var(--error) !important; background: #fff5f5 !important; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fdfeff; padding: 15px; border-radius: 15px; border: 1px solid #edf2f7; margin-bottom: 15px; }
    .item-picker { background: #fff; padding: 15px; border-radius: 15px; border: 2px solid #f0f2f5; margin-bottom: 20px; position: relative; }
    .stock-tag { float: right; font-size: 10px; background: #eef4ff; color: var(--primary); padding: 2px 8px; border-radius: 5px; font-weight: bold; }
    .payment-extra { margin-top: 10px; display: none; flex-direction: column; gap: 8px; }
    .btn-main { color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
    .btn-main:disabled { background: #cbd5e1 !important; cursor: not-allowed; }
    .cart-card { background: var(--light); border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); position: relative; }
    .cart-card-header { font-weight: 700; font-size: 16px; color: var(--dark); margin-bottom: 10px; }
    .cart-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .info-box { background: #fff; padding: 8px; border-radius: 8px; border: 1px solid #edf2f7; }
    .info-box span { font-size: 9px; color: #64748b; font-weight: 700; text-transform: uppercase; display: block; }
    .info-box p { margin: 0; font-size: 12px; font-weight: 600; color: var(--dark); }
    .math-horizontal-box { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .math-item { font-size: 11px; color: #475569; }
    .math-item b { color: var(--dark); }
    .math-total-text { font-size: 15px; font-weight: 800; color: var(--primary); }
    .cart-footer { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .btn-edit { background: #fef3c7; color: #d97706; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
    .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
    .totals-display { background: var(--dark); color: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .btn-sync { background: linear-gradient(135deg, var(--primary), #00d2ff); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
    .btn-sync:disabled { background: #94a3b8; cursor: not-allowed; }
    .filter-section { background: #fff; padding: 12px; border-radius: 14px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
    .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .search-input { width:100%; padding:10px; border-radius:10px; border:1px solid #e2e8f0; font-family: inherit; font-size: 13px; outline: none; box-sizing: border-box; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .stat-card { background:#fff; padding:12px; border-radius:14px; border-left:4px solid var(--primary); }
    .stat-card h4 { margin:0; font-size:10px; text-transform:uppercase; color:var(--muted); }
    .stat-card p { margin:4px 0 0; font-size: 16px; font-weight:800; }
    .sale-card { background:#fff; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:10px; overflow:hidden; }
    .sale-summary { padding:12px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .sale-info h3 { margin:0; font-size:14px; color: var(--dark); }
    .sale-info span { font-size:11px; color:var(--muted); font-weight: 600; }
    .sale-total { font-weight:800; color: var(--primary); }
    .sale-body { display:none; padding:10px 12px; border-top:1px solid #f1f5f9; background: #fafafa; }
    .ledger-row { display:grid; grid-template-columns:30px 1fr 65px 75px 80px; padding:8px 0; font-size:10px; border-bottom: 1px solid #eee; align-items: center; }
    .sticky-bar { position: fixed; bottom: 8px; left: 10px; right: 10px; background: var(--dark); color: white; padding: 8px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .sticky-bar small { font-size: 8px; opacity: 0.7; text-transform: uppercase; font-weight: 700; display: block; line-height: 1; }
    .val-group { display: flex; flex-direction: column; }
    #grand-qty-ledger { font-size: 13px; font-weight: 800; color: #fff; }
    #grand-total-ledger { font-size: 15px; font-weight: 800; color: var(--primary); }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index: 4000; padding: 10px; }
    .modal-box { background: white; max-width: 650px; width: 100%; border-radius: 20px; overflow: hidden; }
    .modal-content { background:#fff; width:100%; max-width:420px; border-radius:18px; max-height:90vh; overflow:auto; padding: 20px; box-sizing: border-box; }
    .edit-block { background: #f8fafc; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
    .edit-row { display: grid; grid-template-columns: 1fr 50px 60px 70px; gap: 6px; margin-top: 5px; }
    .edit-row input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; width:100%; box-sizing:border-box; }
    .btn { border:none; padding:12px; border-radius:10px; font-size:12px; font-weight:600; cursor:pointer; transition: 0.2s; }
    .btn-dark { background:var(--dark); color:#fff; width: 100%; }
    .btn-success { background:var(--success); color:#fff; width: 100%; }
    .btn-del { background:var(--danger); color: #fff; width: 100%; }
    .credit-tag { background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }
    .history-item { font-size: 11px; color: #1f2937; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .history-meta { display: flex; flex-direction: column; }
    .history-meta small { font-size: 9px; color: var(--muted); font-weight: 600; }
    .diagnostic-panel { background: #fff5f5; border: 1px solid #fecaca; border-radius: 14px; padding: 12px; margin-bottom: 12px; display: none; }
    .diagnostic-title { font-size: 11px; font-weight: 800; color: var(--error); text-transform: uppercase; display: flex; justify-content: space-between; }
    .diagnostic-log { font-size: 11px; margin-top: 5px; color: #7f1d1d; font-family: monospace; line-height: 1.4; }
</style>
</head>
<body>

<header class="header-nav">
    <div class="brand">
        AssetGuard <span>Terminal</span>
        <span id="user-badge" style="display:none; font-size:10px; color:var(--muted); font-weight:600; margin-top:2px;">Detecting Session...</span>
    </div>
    <button class="toggle-view-btn" id="toggle-btn" onclick="toggleMainView()">Sales Ledger</button>
</header>

<div id="view-terminal" class="view-container active">
    <div class="container">
        <div id="syncStatus"></div>
        <div id="saleSection">
            <h2>Sales Terminal</h2>
            <div class="form-grid">
                <div>
                    <label>Customer Name</label>
                    <input type="text" id="customer_name" value="Walk-in Customer" oninput="syncHeaderToCart(); validatePayment();">
                </div>
                <div>
                    <label>Payment Method</label>
                    <select id="payment_status" onchange="togglePaymentExtra(); syncHeaderToCart();">
                        <option value="Cash">Cash</option>
                        <option value="M-Pesa">M-Pesa</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Credit">Credit</option>
                    </select>
                    <div id="payment_extra_container" class="payment-extra">
                        <input type="text" id="mpesa_number" placeholder="M-Pesa Number" oninput="syncHeaderToCart(); validatePayment();">
                        <input type="text" id="bank_details" placeholder="Bank Reference Code" oninput="syncHeaderToCart(); validatePayment();">
                    </div>
                </div>
            </div>

            <div class="item-picker">
                <span id="stock_display" class="stock-tag">STOCK: --</span>
                <label>Select Stock Item</label>
                <select id="product_stock" onchange="updateStockDisplay(); validatePayment();">
                    <option value="" disabled selected>-- Choose Item --</option>
                </select>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <div style="flex: 2;"><label>Price (Excl. VAT)</label><input type="number" id="price" oninput="validatePayment()"></div>
                    <div style="flex: 1;"><label>Qty</label><input type="number" id="quantity" value="1" oninput="validatePayment()"></div>
                    <div style="flex: 1;"><label>VAT %</label><input type="number" id="vat_rate" value="16" oninput="validatePayment()"></div>
                </div>
                <button class="btn-main" id="addBtn" onclick="addToCart()" style="background:var(--dark);" disabled>Add to Sale</button>
            </div>

            <div id="cart-section"></div>

            <div class="totals-display">
                <span style="font-size: 11px; opacity: 0.8;">GRAND TOTAL (VAT ADDED)</span>
                <span id="grand-total-terminal" style="font-size: 22px; font-weight: 700;">KES 0.00</span>
            </div>
            <button class="btn-sync" id="processBtn" onclick="processSale()">Confirm Sale & Sync Cloud</button>
        </div>
    </div>
</div>

<div id="view-ledger" class="view-container">
    <div id="offlineDiagnosticPanel" class="diagnostic-panel">
        <div class="diagnostic-title">
            <span>⚠️ Offline Resilience Alert</span>
            <span id="diagnosticQuotaText">0 KB / 5120 KB</span>
        </div>
        <div id="diagnosticLogMessage" class="diagnostic-log"></div>
    </div>

    <div class="filter-section">
        <small style="font-weight:800; color:var(--muted)">DATA FILTERS</small>
        <div class="filter-grid">
            <select id="yearFilter" onchange="renderSales()">
                <option value="all">All Years</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
            </select>
            <select id="monthFilter" onchange="renderSales()">
                <option value="all" selected>Full Year View</option>
                <option value="0">January</option><option value="1">February</option><option value="2">March</option>
                <option value="3">April</option><option value="4">May</option><option value="5">June</option>
                <option value="6">July</option><option value="7">August</option><option value="8">September</option>
                <option value="9">October</option><option value="10">November</option><option value="11">December</option>
            </select>
        </div>
    </div>
    <input class="search-input" placeholder="Search customer or product..." onkeyup="filterSales()" id="searchInput">
    <div class="stats-grid" style="margin-top: 12px;">
        <div class="stat-card"><h4>Gross Revenue</h4><p id="stat-gross">KES 0</p></div>
        <div class="stat-card" style="border-left-color:var(--danger)"><h4>Total VAT (16%)</h4><p id="stat-tax">KES 0</p></div>
    </div>
    <div id="sales-container"></div>
    <div class="sticky-bar">
        <div class="val-group"><small>Qty</small><div id="grand-qty-ledger">0</div></div>
        <div class="val-group" style="text-align: right;"><small>Grand Total (Inc. VAT)</small><div id="grand-total-ledger">KES 0.00</div></div>
    </div>
</div>

<div id="receiptModal" class="modal">
    <div class="modal-box">
        <div id="receipt-area" style="padding:0px; background:#fff; font-family:'Plus Jakarta Sans', sans-serif; color:#000; overflow: auto; max-height: 70vh;"></div>
        <div style="padding:20px; background:#f8fafc; border-top: 1px solid #e2e8f0; display:flex; flex-direction: column; gap:10px;">
            <div style="display:flex; gap:10px;">
                <button class="btn-main" style="background:var(--primary); margin:0; flex:1;" onclick="shareReceipt()">Download PDF</button>
                <button class="btn-main" style="background:#25D366; margin:0; flex:1;" onclick="nativeShare()">Share Receipt</button>
            </div>
            <button class="btn-main" style="background:var(--muted); margin:0;" onclick="closeReceipt()">Close</button>
        </div>
    </div>
</div>

<div id="manageModal" class="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 15px 0; font-size: 16px;">Update Transaction</h3>
        
        <div id="credit-payment-block" style="display:none; background:#f0f7ff; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #d0e1fd;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="font-size:10px; font-weight:800; color:var(--primary);">CREDIT BALANCE</span>
                <b id="credit-bal-text" style="color:var(--dark);">KES 0.00</b>
            </div>
            <div id="payment-history-list" style="max-height:120px; overflow:auto; margin-bottom:10px; background:white; padding:8px; border-radius:6px; border:1px solid #e2e8f0;"></div>
            <div style="display:grid; grid-template-columns: 1fr 80px; gap:8px;">
                <input type="number" id="manual-pay-amt" placeholder="Amount to Pay" style="background:white; border-color:var(--primary); padding:8px; font-size:12px;">
                <button id="btn-add-payment" class="btn btn-dark" style="padding:8px; font-size:10px;">ADD PAY</button>
            </div>
        </div>

        <label style="font-size:10px;font-weight:800; color: var(--muted)">CUSTOMER NAME</label>
        <input type="text" id="edit-cust-name" class="search-input" style="margin-bottom: 10px;">
        <label style="font-size:10px;font-weight:800; color: var(--muted)">PAYMENT REFERENCE</label>
        <input type="text" id="edit-pay-ref" class="search-input" style="margin-bottom: 15px;">
        <div id="edit-items-container"></div>
        <div style="display:flex; flex-direction: column; gap: 8px; margin-top: 15px;">
            <button id="btn-save-changes" class="btn btn-success">Update Record</button>
            <button id="btn-del-mode" class="btn btn-del">Delete Transaction</button>
            <button onclick="closeModal()" class="btn btn-dark" style="background: var(--muted)">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, onValue, push, set, runTransaction, remove, update } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDCkP7LTzdNcvZhp24rRsQirYDCcrsuvOA",
    authDomain: "assetguard-c8c8c.firebaseapp.com",
    databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com/",
    projectId: "assetguard-c8c8c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const urlParams = new URLSearchParams(window.location.search);
let resolvedUID = urlParams.get('uid') || urlParams.get('user') || urlParams.get('currentUID') || urlParams.get('userId');

if (!resolvedUID) {
    try {
        if (window.AppInventor && typeof window.AppInventor.getWebViewString === 'function') {
            const wvString = window.AppInventor.getWebViewString();
            if (wvString && wvString !== "undefined" && wvString !== "null" && wvString.trim() !== "") {
                if (wvString.startsWith('{') || wvString.startsWith('[')) {
                    try {
                        const parsed = JSON.parse(wvString);
                        resolvedUID = parsed.uid || parsed.userId || parsed.username || wvString;
                    } catch(e) {
                        resolvedUID = wvString;
                    }
                } else {
                    resolvedUID = wvString;
                }
            }
        }
    } catch(e) {
        console.error("WebViewString capture failed", e);
    }
}

if (!resolvedUID) {
    resolvedUID = localStorage.getItem("ag_active_uid");
}

if (!resolvedUID || resolvedUID === "null" || resolvedUID === "undefined" || resolvedUID.trim() === "") {
    resolvedUID = "global_terminal_user";
}

const currentUID = resolvedUID;
localStorage.setItem("ag_active_uid", currentUID);

const inventoryPath = `users/${currentUID}/inventory`;
const salesPath = `users/${currentUID}/sales`;
// UPDATED PROFILE PATH to point directly to the shared business profile info
const profilePath = "company_info/businessProfile";

let cart = [];
let editIndex = -1;

let firebaseInventory = JSON.parse(localStorage.getItem(`ag_stock_cache_${currentUID}`)) || {};
let syncQueue = JSON.parse(localStorage.getItem(`ag_sales_queue_${currentUID}`)) || [];
let rawLedgerData = JSON.parse(localStorage.getItem(`ag_ledger_cache_${currentUID}`)) || {}; 
let userProfile = JSON.parse(localStorage.getItem(`ag_profile_cache_${currentUID}`)) || { businessName: "Business Name", tagline: "Your Business Tagline" };

let openLedgerCard = null;
let currentActiveLedgerId = null;

const runtimeActiveLedgerSalesMap = new Map();

const pdfOptions = {
    margin: [10, 5, 10, 5],
    filename: `Official_Receipt_${Date.now()}.pdf`,
    image: { type: 'jpeg', quality: 1.0 },
    html2canvas: { scale: 4, useCORS: true, letterRendering: true, scrollX: 0, scrollY: 0 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', precision: 16 }
};

window.toggleMainView = () => {
    const term = document.getElementById('view-terminal');
    const ledg = document.getElementById('view-ledger');
    const btn = document.getElementById('toggle-btn');
    if(term.classList.contains('active')) {
        term.classList.remove('active'); ledg.classList.add('active');
        btn.innerText = "Back to Terminal"; renderSales();
    } else {
        ledg.classList.remove('active'); term.classList.add('active');
        btn.innerText = "Sales Ledger";
    }
};

window.onload = () => {
    const badge = document.getElementById('user-badge');
    if (badge) {
        badge.innerText = `Active Session: ${currentUID}`;
    }
    populateDropdown();
    updateStatusUI();
    renderSales(); 
    deepSyncFirebase();
    if (navigator.onLine) attemptSync();
};

async function deepSyncFirebase() {
    const baseURL = "https://assetguard-c8c8c-default-rtdb.firebaseio.com/";
    const paths = [`users/${currentUID}/sales.json`];
    let consolidatedSales = {}; 

    const extract = (data) => {
        if (!data || typeof data !== 'object') return;
        Object.keys(data).forEach(key => {
            const entry = data[key];
            if (entry && entry.items && entry.timestamp && entry.saleId) {
                consolidatedSales[entry.saleId] = entry; 
            } else if (typeof entry === 'object') {
                extract(entry);
            }
        });
    };

    try {
        for (const path of paths) {
            const res = await fetch(baseURL + path);
            const data = await res.json();
            extract(data);
        }
        if(Object.keys(consolidatedSales).length > 0) {
            rawLedgerData = consolidatedSales;
            localStorage.setItem(`ag_ledger_cache_${currentUID}`, JSON.stringify(rawLedgerData));
            renderSales();
        }
    } catch (e) { console.error("Deep Sync Failed", e); }
}

onValue(ref(db, inventoryPath), snap => {
    firebaseInventory = snap.val() || {};
    localStorage.setItem(`ag_stock_cache_${currentUID}`, JSON.stringify(firebaseInventory));
    populateDropdown();
});

onValue(ref(db, salesPath), snapshot => {
    const snapVal = snapshot.val();
    rawLedgerData = snapVal || {};
    localStorage.setItem(`ag_ledger_cache_${currentUID}`, JSON.stringify(rawLedgerData));
    renderSales();
});

// Dynamic Profile Listener now points to the Centralized Settings
onValue(ref(db, profilePath), snap => {
    if(snap.exists()) {
        userProfile = snap.val();
        localStorage.setItem(`ag_profile_cache_${currentUID}`, JSON.stringify(userProfile));
    }
});

function populateDropdown() {
    const ps = document.getElementById('product_stock');
    if(!ps) return;
    ps.innerHTML = '<option value="" disabled selected>-- Choose Item --</option>';
    Object.keys(firebaseInventory).forEach(k => {
        let o = document.createElement('option');
        o.value = k; o.innerText = firebaseInventory[k].name;
        ps.appendChild(o);
    });
}

window.updateStockDisplay = () => {
    const k = document.getElementById('product_stock').value;
    if(k && firebaseInventory[k]) {
        document.getElementById('stock_display').innerText = `STOCK: ${firebaseInventory[k].qty}`;
        document.getElementById('price').value = firebaseInventory[k].salePrice;
    }
};

window.validatePayment = () => {
    const method = document.getElementById('payment_status').value;
    const mpesa = document.getElementById('mpesa_number');
    const bank = document.getElementById('bank_details');
    const product = document.getElementById('product_stock').value;
    const qtyInput = document.getElementById('quantity');
    const priceInput = document.getElementById('price');
    
    if(qtyInput.value !== "" && parseFloat(qtyInput.value) <= 0) qtyInput.value = 1;

    const qty = parseFloat(qtyInput.value);
    const price = parseFloat(priceInput.value);

    let paymentOk = true;
    if (method === 'M-Pesa') {
        paymentOk = /^(07|01)\d{8}$/.test(mpesa.value) || /^\+254\d{9}$/.test(mpesa.value);
        mpesa.className = mpesa.value === "" ? "" : (paymentOk ? 'valid-kenya' : 'invalid-kenya');
    } else if (method === 'Bank Transfer') {
        paymentOk = bank.value.length >= 5;
        bank.className = bank.value === "" ? "" : (paymentOk ? 'valid-kenya' : 'invalid-kenya');
    }
    
    document.getElementById('addBtn').disabled = !(paymentOk && product && qty > 0 && price > 0);
};

    const bank = document.getElementById('bank_details').value;

window.addToCart = () => {
    const k = document.getElementById('product_stock').value;
    const qty = parseFloat(document.getElementById('quantity').value);
    const prc = parseFloat(document.getElementById('price').value);
    const vRate = parseFloat(document.getElementById('vat_rate').value);

    if(qty <= 0 || isNaN(qty)) return alert("Quantity must be a positive number.");

    const sub = prc * qty;
    const vAmt = sub * (vRate / 100);

    const newItem = {
        dbKey: k, product: firebaseInventory[k].name, price: prc, quantity: qty,
        vatRate: vRate, vatAmount: vAmt.toFixed(2), total: (sub + vAmt).toFixed(2),
        customer: document.getElementById('customer_name').value,
        payment: document.getElementById('payment_status').value,
        mpesa: document.getElementById('mpesa_number').value || "",
        bank: document.getElementById('bank_details').value || ""
    };

    if(editIndex > -1) { cart[editIndex] = newItem; editIndex = -1; document.getElementById('addBtn').innerText = "Add to Sale"; }
    else { cart.push(newItem); }
    
    syncHeaderToCart(); lockInputs(true); resetItemFields();
};

window.processSale = () => {
    if(!cart.length) return;
    
    const btn = document.getElementById('processBtn');
    btn.disabled = true;
    btn.innerText = "Processing...";

    const uniqueSaleId = "SALE-" + Date.now() + "-" + Math.floor(Math.random() * 1000);

    const trans = {
        saleId: uniqueSaleId,
        customer: cart[0].customer,
        payment: cart[0].payment,
        mpesa: cart[0].mpesa || "",
        bank: cart[0].bank || "",
        timestamp: new Date().toISOString(),
        items: cart,
        payments: [] 
    };
    
    syncQueue.push(trans);
    localStorage.setItem(`ag_sales_queue_${currentUID}`, JSON.stringify(syncQueue));
    
    // Deduct stock locally immediately to prevent multi-sales
    cart.forEach(itm => {
        if (firebaseInventory[itm.dbKey]) {
            firebaseInventory[itm.dbKey].qty = Math.max(0, firebaseInventory[itm.dbKey].qty - itm.quantity);
        }
    });
    localStorage.setItem(`ag_stock_cache_${currentUID}`, JSON.stringify(firebaseInventory));
    populateDropdown();

    openReceiptSummary([...cart]);
    resetFullForm();
    
    // Instantly render changes on the UI Ledger
    renderSales();
    attemptSync();

async function attemptSync() {
    if(!navigator.onLine || syncQueue.length === 0) return;
    let tempQueue = [...syncQueue];
    const diagPanel = document.getElementById('offlineDiagnosticPanel');
    const diagLog = document.getElementById('diagnosticLogMessage');
    
    for(let i = 0; i < tempQueue.length; i++) {
        const trans = { ...tempQueue[i] };
        const sID = trans.saleId;
        try {
            if (trans.isDeleteOnly) {
                await remove(ref(db, `${salesPath}/${sID}`));
            } else if (trans.isUpdateOnly) {
                delete trans.isUpdateOnly;
                await update(ref(db, `${salesPath}/${sID}`), trans);
            } else {
                for (let itm of trans.items) {
                    try {
                        await runTransaction(ref(db, `${inventoryPath}/${itm.dbKey}/qty`), q => {
                            if (q === null) return 0;
                            return Math.max(0, q - itm.quantity);
                        });
                    } catch (transErr) {
                        const snap = await fetch(`https://assetguard-c8c8c-default-rtdb.firebaseio.com/${inventoryPath}/${itm.dbKey}/qty.json`);
                        const currentQty = await snap.json() || 0;
                        await set(ref(db, `${inventoryPath}/${itm.dbKey}/qty`), Math.max(0, currentQty - itm.quantity));
                    }
                }
                await set(ref(db, `${salesPath}/${sID}`), trans); 
            }
            syncQueue.shift();
            localStorage.setItem(`ag_sales_queue_${currentUID}`, JSON.stringify(syncQueue));
            
            if (!trans.isDeleteOnly) {
                rawLedgerData[sID] = trans;
                localStorage.setItem(`ag_ledger_cache_${currentUID}`, JSON.stringify(rawLedgerData));
            } else {
                delete rawLedgerData[sID];
                localStorage.setItem(`ag_ledger_cache_${currentUID}`, JSON.stringify(rawLedgerData));
            }
            renderSales();
        } catch (e) { 
            console.error("Sync error caught: ", e);
            if (diagPanel && diagLog) {
                diagPanel.style.display = "block";
                diagLog.innerText = `Sync failed: ${e.message || e}. Will retry when connection stabilizes.`;
            }
            break; 
        }
    }
    updateStatusUI();
}

function updateStatusUI() {
    const banner = document.getElementById('syncStatus');
    if (!banner) return;
    if (!navigator.onLine) { banner.innerText = "Offline Mode"; banner.className = "status-offline"; banner.style.display = "block"; }
    else if (syncQueue.length > 0) { banner.innerText = "Syncing..."; banner.className = "status-syncing"; banner.style.display = "block"; }
    else banner.style.display = "none";
}

    const dateObj = new Date(timestamp);

    let subTotal = 0;

    let tableRows = items.map(s => {

                    <small style="color:#0072CE; font-size:10px; font-weight:700; text-transform:uppercase;">${userProfile.tagline || 'Business Tagline / Address'}</small>
                </div>

                    INVOICE NO: <b>${timestamp.split('-').pop().substring(0,8).toUpperCase()}</b><br>
                    DATE: <b>${dateStr}</b><br>
                    TIME: <b>${timeStr}</b>
                </div>
            </div>

            <div style="background:#f1f5f9; padding:12px 20px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <b style="font-size:13px; text-transform:uppercase; letter-spacing:1px; color:#001A35;">OFFICIAL SALES RECEIPT</b>
                <b style="color:${statusColor}; font-size:13px;">${statusText}</b>
            </div>

            <div style="margin-bottom:25px;">
                <small style="font-size:9px; font-weight:800; color:#94a3b8; text-transform:uppercase;">Customer Details</small><br>
                <b style="font-size:13px; color:#001A35;">${customer}</b><br>
                <span style="font-size:10px; color:#64748b;">Payment Method: ${payment} ${reference}</span>
            </div>

            <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                <thead>
                    <tr style="border-bottom: 2px solid #0072CE; text-align:left; color:#94a3b8; font-size:9px; text-transform:uppercase; font-weight:800;">
                        <th style="padding:10px 0;">Description</th>
                        <th style="text-align:center;">Qty</th>
                        <th style="text-align:center;">Unit Price</th>
                        <th style="text-align:center;">Vat</th>
                        <th style="text-align:right;">Total (KES)</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>

            <div style="display:flex; justify-content:flex-end; margin-bottom:30px;">
                <div style="width:250px; text-align:right;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:11px;">
                        <span style="color:#64748b;">Invoice Total</span>
                        <b>${grandTotal.toLocaleString()}</b>
                    </div>
                    ${isCredit && paymentHistoryRows ? `

window.renderSales = () => {
    const container = document.getElementById('sales-container');
    if (!container) return;
    const selectedMonth = document.getElementById('monthFilter').value;
    const selectedYear = document.getElementById('yearFilter').value;
    container.innerHTML = "";
    runtimeActiveLedgerSalesMap.clear();
    
    let gQty=0, gTotal=0, gTax=0;
    
    const combinedSales = { ...rawLedgerData };
    syncQueue.forEach(item => {
        if (item.isDeleteOnly) {
            delete combinedSales[item.saleId];
        } else if (item.isUpdateOnly) {
            if (combinedSales[item.saleId]) {
                combinedSales[item.saleId] = { ...combinedSales[item.saleId], ...item, isPending: true };
            }
        } else {
            combinedSales[item.saleId] = { ...item, isPending: true };
        }
    });
    
    const allSales = Object.keys(combinedSales).map(k => ({ id: k, ...combinedSales[k] }))
                     .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                     
    if(allSales.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:30px; color:var(--muted); font-weight:600;">No sales history found.</div>`;
    }

    allSales.forEach(s => {
        if (!s.timestamp || !s.items) return;
        const date = new Date(s.timestamp);
        if (selectedYear !== "all" && date.getFullYear().toString() !== selectedYear) return;
        if (selectedMonth !== "all" && date.getMonth().toString() !== selectedMonth) return;
        
        let saleTotal = 0, saleQty = 0, saleTax = 0;
        const rows = s.items.map(i => {
            saleTotal += parseFloat(i.total || 0); saleQty += parseFloat(i.quantity || 0); saleTax += parseFloat(i.vatAmount || 0);
            return `<div class="ledger-row"><div><b>${i.quantity}</b></div><div style="padding-right: 4px;">${i.product}</div><div style="color:var(--muted)">@${i.price}</div><div style="color:var(--danger); font-size:9px;">V:${i.vatRate}%</div><div style="text-align:right; font-weight: 800;">KES ${parseFloat(i.total).toLocaleString()}</div></div>`;
        }).join('');
        
        const isCredit = (s.payment === "Credit");
        const paidSoFar = (s.payments || []).reduce((acc, p) => acc + parseFloat(p.amount || 0), 0);
        const bal = saleTotal - paidSoFar;
        
        gQty += saleQty; gTotal += saleTotal; gTax += saleTax;
        
        const isPending = !!s.isPending;
        const pendingBadge = isPending ? `<span style="background: #fef3c7; color: #d97706; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; margin-left: 5px;">Syncing...</span>` : '';
        
        container.insertAdjacentHTML('beforeend', `
            <div class="sale-card" style="${isPending ? 'border-left: 4px solid var(--warning);' : ''}">
                <div class="sale-summary" onclick="toggleLedgerCard('${s.id}')">
                    <div class="sale-info">
                        <h3>${s.customer} ${isCredit ? `<span class="credit-tag">Credit ${bal > 0 ? '(Pending)' : '(Settled)'}</span>` : ''}${pendingBadge}</h3>
                        <span>${date.toLocaleDateString()}</span>
                    </div>
                    <div class="sale-total">KES ${saleTotal.toLocaleString()}</div>
                </div>
                <div class="sale-body" id="body-${s.id}">
                    <div style="font-size: 10px; color: var(--muted); margin-bottom: 8px; font-weight: 800;">PAYMENT: ${s.payment} ${s.mpesa || s.bank || ""}</div>
                    ${rows}
                    ${isCredit ? `
                        <div style="margin-top:10px; background:#fff7ed; padding:8px; border-radius:8px; border:1px solid #ffedd5; display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:11px; font-weight:800; color:#c2410c;">REMAINING BALANCE:</span>
                            <b style="color:var(--danger); font-size:14px;">KES ${bal.toLocaleString()}</b>
                        </div>
                    ` : ''}
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <button class="btn btn-dark" style="flex:1;" onclick="event.stopPropagation(); openManager('${s.id}')" ${isPending ? 'disabled' : ''}>MANAGE / PAY</button>
                        <button class="btn" style="flex:1; background:var(--primary); color:white;" onclick="event.stopPropagation(); reprintReceipt('${s.id}')">INVOICE</button>
                    </div>
                </div>
            </div>`);
            
        runtimeActiveLedgerSalesMap.set(s.id, s);
    });
    
    document.getElementById('stat-gross').innerText = `KES ${gTotal.toLocaleString()}`;
    document.getElementById('stat-tax').innerText = `KES ${gTax.toLocaleString()}`;
    document.getElementById('grand-qty-ledger').innerText = gQty;
    document.getElementById('grand-total-ledger').innerText = `KES ${gTotal.toLocaleString()}`;
};

window.openManager = id => {
    currentActiveLedgerId = id;
    const s = runtimeActiveLedgerSalesMap.get(id);
    if (!s) return;
    document.getElementById('edit-cust-name').value = s.customer;
    document.getElementById('edit-pay-ref').value = s.mpesa || s.bank || "";
    document.getElementById('manual-pay-amt').value = "";
    
    const isCredit = (s.payment === "Credit");
    const creditBlock = document.getElementById('credit-payment-block');
    if (isCredit) {
        creditBlock.style.display = 'block';
        const saleTotal = s.items.reduce((acc, i) => acc + parseFloat(i.total || 0), 0);
        const paidSoFar = (s.payments || []).reduce((acc, p) => acc + parseFloat(p.amount || 0), 0);
        const bal = saleTotal - paidSoFar;
        document.getElementById('credit-bal-text').innerText = `KES ${bal.toLocaleString()}`;
        
        const historyList = document.getElementById('payment-history-list');
        historyList.innerHTML = (s.payments || []).map(p => {
            const d = new Date(p.date);
            return `<div class="history-item"><div class="history-meta"><b>KES ${parseFloat(p.amount).toLocaleString()}</b><small>${d.toLocaleDateString()}</small></div></div>`;
        }).join('') || '<small style="color:var(--muted); font-style:italic;">No payments yet.</small>';
    } else { creditBlock.style.display = 'none'; }

    document.getElementById('edit-items-container').innerHTML = s.items.map((item, idx) => `
        <div class="edit-block" data-index="${idx}">
            <div class="edit-row">
                <input type="text" value="${item.product}" class="item-prod" readonly>
                <input type="number" value="${item.quantity}" class="item-qty">
                <input type="number" value="${item.price}" class="item-price">
                <input type="number" value="${item.vatRate}" class="item-vrate">
            </div>
        </div>`).join('');
    document.getElementById('manageModal').style.display = 'flex';
};

document.getElementById('btn-add-payment').onclick = async () => {
    const amt = parseFloat(document.getElementById('manual-pay-amt').value);
    if (!amt || amt <= 0) return alert("Please enter a valid payment amount.");
    const s = runtimeActiveLedgerSalesMap.get(currentActiveLedgerId);
    const newPayments = s.payments || [];
    newPayments.push({ amount: amt, date: new Date().toISOString() });
    if (navigator.onLine) { await update(ref(db, `${salesPath}/${currentActiveLedgerId}`), { payments: newPayments }); }
    openManager(currentActiveLedgerId);
};

document.getElementById('btn-save-changes').onclick = async () => {
    const s = runtimeActiveLedgerSalesMap.get(currentActiveLedgerId);
    const updated = [];
    document.querySelectorAll('.edit-block').forEach((block, idx) => {
        const q = parseFloat(block.querySelector('.item-qty').value);
        const p = parseFloat(block.querySelector('.item-price').value);
        const vr = parseFloat(block.querySelector('.item-vrate').value);
        const sub = q * p; const vat = sub * (vr/100);
        updated.push({ ...s.items[idx], quantity: q, price: p, vatRate: vr, total: (sub+vat).toFixed(2), vatAmount: vat.toFixed(2) });
    });
    const payload = { customer: document.getElementById('edit-cust-name').value, items: updated };
    if (navigator.onLine) { await update(ref(db, `${salesPath}/${currentActiveLedgerId}`), payload); }
    document.getElementById('manageModal').style.display = 'none'; 
};

document.getElementById('btn-del-mode').onclick = async () => {
    if (navigator.onLine) { await remove(ref(db, `${salesPath}/${currentActiveLedgerId}`)); }
    document.getElementById('manageModal').style.display = 'none'; 
};

window.closeModal = () => document.getElementById('manageModal').style.display = 'none';
window.filterSales = () => {
    const q = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll(".sale-card").forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none");
};

window.addEventListener('online', attemptSync);
</script>
</body>
</html>
