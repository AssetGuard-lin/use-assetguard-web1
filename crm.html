<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AssetGuard Pro - Contacts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        /* CSS remains exactly as your original professional styling */
        :root { --primary:#0072CE; --mpesa:#40c057; --danger:#ef4444; --dark:#001A35; --bg:#f4f6f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0 12px; color: #1f2937; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .header-box { display: flex; justify-content: flex-end; align-items: center; padding: 15px 5px; position: sticky; top: 0; background: var(--bg); z-index: 100; min-height: 40px; box-shadow: 0 4px 12px -10px rgba(0,0,0,0.1); }
        .header-box h1 { margin: 0; font-size: 19px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; position: absolute; left: 50%; transform: translateX(-50%); }
        .lock-btn { background: var(--dark); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; z-index: 10; margin-left: 5px; transition: 0.3s; }
        .lock-btn.active { background: var(--danger); }
        .security-bar { display: none; background: var(--dark); padding: 12px; border-radius: 12px; margin-bottom: 12px; align-items: center; justify-content: space-between; }
        .security-bar.visible { display: flex; }
        .pin-input { width: 70px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: #fff; padding: 6px; text-align: center; font-size: 14px; outline: none; letter-spacing: 2px; }
        .search-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-size: 14px; background: #fff; outline: none; }
        .contact-row { background: #fff; padding: 12px; margin-bottom: 8px; border-radius: 14px; border: 1px solid #edf2f7; display: flex; align-items: center; gap: 12px; transition: 0.2s; position: relative; }
        .unlocked-view .contact-row { cursor: pointer; }
        .contact-row.selected { border-color: var(--danger); background: #fff5f5; transform: scale(0.98); }
        .avatar { width: 40px; height: 40px; background: #f0f7ff; color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .info { flex: 1; }
        .info h3 { margin: 0; font-size: 14px; font-weight: 700; color: var(--dark); }
        .info p { margin: 2px 0 0 0; font-size: 12px; color: var(--mpesa); font-family: 'Courier Prime', monospace; }
        .select-box { display: none; width: 22px; height: 22px; border-radius: 6px; border: 2px solid #cbd5e1; transition: 0.2s; }
        .unlocked-view .select-box { display: block; }
        .contact-row.selected .select-box { background: var(--danger); border-color: var(--danger); position: relative; }
        .contact-row.selected .select-box::after { content: '✓'; color: white; position: absolute; left: 4px; top: -2px; font-weight: 800; }
        .admin-set { display: none; gap: 6px; }
        .unlocked-view .admin-set { display: flex; }
        #batchBar { display: none; position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--dark); padding: 15px; border-radius: 20px; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideUp 0.3s ease-out; }
        .btn-tool { border: none; width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .btn-edit { background: #fffbeb; color: #d97706; }
        .btn-call { background: #f0f9ff; color: var(--primary); text-decoration: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--dark); color: white; border-radius: 20px; border: none; font-size: 30px; z-index: 99; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .unlocked-view .fab { display: flex; align-items: center; justify-content: center; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,26,53,0.8); z-index: 2000; align-items: flex-end; backdrop-filter: blur(4px); }
        .sheet { background: #fff; width: 100%; border-radius: 28px 28px 0 0; padding: 30px 25px; box-sizing: border-box; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet input { width:100%; padding:15px; margin:10px 0; border:1px solid #e2e8f0; border-radius:12px; outline: none; font-size: 14px; box-sizing: border-box; }
        .btn-save { width:100%; background:var(--dark); color:white; border:none; padding:16px; border-radius:14px; font-weight:800; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

<div class="header-box">
    <h1>Contacts</h1>
    <div style="display:flex; gap:5px;">
        <button class="lock-btn" id="cleanBtn" onclick="openConfirm('clean')" style="background:var(--mpesa); display:none;">FIX DUPS</button>
        <button class="lock-btn" id="lockTrigger" onclick="handleLockToggle()">UNLOCK</button>
    </div>
</div>

<div class="security-bar" id="lockBar">
    <span style="color:#fff; font-size:10px; font-weight:800;">MASTER PIN</span>
    <input type="password" id="masterPin" class="pin-input" maxlength="4" placeholder="••••" oninput="checkPin()">
</div>

<input type="text" id="searchInput" class="search-input" placeholder="Search registry..." onkeyup="filter()">

<div id="contact-list"></div>

<div id="batchBar">
    <span id="selectedCount" style="color:white; font-size:13px; font-weight:800;">0 SELECTED</span>
    <div style="display:flex; gap:8px;">
        <button onclick="clearSelection()" style="background:transparent; color:#94a3b8; border:none; font-weight:800; font-size:11px;">CANCEL</button>
        <button onclick="openConfirm('delete')" class="lock-btn active" style="margin:0; padding: 10px 15px;">DELETE ALL</button>
    </div>
</div>

<button class="fab" onclick="openAdd()">+</button>

<div id="sheetOverlay" class="overlay"><div class="sheet">
    <h4 id="sheetTitle" style="margin:0 0 10px 0; font-weight:800; font-size: 18px;">Registration</h4>
    <input type="text" id="sheetName" placeholder="Client Name">
    <input type="tel" id="sheetPhone" placeholder="M-Pesa Number">
    <button id="saveBtn" onclick="processEntry()" class="btn-save" style="background:var(--mpesa)">SAVE CONTACT</button>
    <button onclick="closeSheets()" style="width:100%; border:none; background:none; color:#94a3b8; font-size:12px; margin-top:15px; font-weight:700;">CLOSE</button>
</div></div>

<div id="confirmOverlay" class="overlay"><div class="sheet" style="text-align: center;">
    <div id="confirmIcon" style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
    <h4 id="confirmTitle" style="margin:0 0 5px 0; font-weight:800;">Are you sure?</h4>
    <p id="confirmDesc" style="font-size: 13px; color: #64748b; margin: 0 0 20px 0;">This action cannot be undone.</p>
    <button id="confirmActionBtn" class="btn-save" style="background:var(--danger)">CONFIRM PROCEED</button>
    <button onclick="closeConfirm()" style="width:100%; border:none; background:none; color:#94a3b8; font-size:12px; margin-top:15px; font-weight:700;">CANCEL</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDCkP7LTzdNcvZhp24rRsQirYDCcrsuvOA",
        authDomain: "assetguard-c8c8c.firebaseapp.com",
        databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com",
        projectId: "assetguard-c8c8c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- USER ISOLATION ---
    const currentUID = localStorage.getItem("ag_active_uid");
    const userSalesPath = `users/${currentUID}/sales`;
    const cacheKey = `ag_contacts_cache_${currentUID}`;
    
    let contacts = JSON.parse(localStorage.getItem(cacheKey) || "[]");
    let isAdmin = false;
    let selectedIds = new Set();
    let currentEditId = null;

    if (!currentUID) {
        document.body.innerHTML = "<h2 style='padding:50px; text-align:center;'>Access Denied. Please Login.</h2>";
    }

    // Initial render from UID-specific cache
    if(contacts.length > 0) render();

    onValue(ref(db, userSalesPath), snap => {
        const data = snap.val() || {};
        contacts = Object.entries(data).map(([id, s]) => ({
            id,
            name: s.customer || "Walk-in",
            phone: s.mpesa || s.phone || "No Number",
            ts: s.timestamp || 0
        })).filter(c => c.phone !== "No Number").sort((a,b) => b.ts - a.ts);
        
        localStorage.setItem(cacheKey, JSON.stringify(contacts));
        render();
    });

    function render() {
        const list = document.getElementById('contact-list');
        list.innerHTML = contacts.map(c => `
            <div class="contact-row ${selectedIds.has(c.id) ? 'selected' : ''}" onclick="handleRowClick('${c.id}')">
                <div class="select-box"></div>
                <div class="avatar">${c.name.charAt(0)}</div>
                <div class="info">
                    <h3>${c.name}</h3>
                    <p>${c.phone}</p>
                </div>
                <div class="actions">
                    <a href="tel:${c.phone}" class="btn-call" onclick="event.stopPropagation()">📞</a>
                    <div class="admin-set">
                        <button onclick="event.stopPropagation(); openEdit('${c.id}', '${c.name.replace(/'/g, "\\'")}', '${c.phone}')" class="btn-tool btn-edit">📝</button>
                    </div>
                </div>
            </div>
        `).join('');
        updateBatchBar();
    }

    window.handleRowClick = (id) => {
        if (!isAdmin) return;
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        render();
    };

    window.clearSelection = () => {
        selectedIds.clear();
        updateBatchBar();
        render();
    };

    function updateBatchBar() {
        const bar = document.getElementById('batchBar');
        const countText = document.getElementById('selectedCount');
        if (isAdmin && selectedIds.size > 0) {
            bar.style.display = 'flex';
            countText.innerText = `${selectedIds.size} SELECTED`;
        } else {
            bar.style.display = 'none';
        }
    }

    window.openConfirm = (type) => {
        const btn = document.getElementById('confirmActionBtn');
        if(type === 'delete') {
            document.getElementById('confirmTitle').innerText = "Delete Selected?";
            document.getElementById('confirmDesc').innerText = `You are about to remove ${selectedIds.size} records from your account.`;
            btn.onclick = executeBatchDelete;
        } else {
            document.getElementById('confirmTitle').innerText = "Fix All Duplicates?";
            document.getElementById('confirmDesc').innerText = "Only the newest record for each phone number in your account will be kept.";
            btn.onclick = executeAutoClean;
        }
        document.getElementById('confirmOverlay').style.display = 'flex';
    };

    const executeBatchDelete = () => {
        const idsToDelete = Array.from(selectedIds);
        contacts = contacts.filter(c => !selectedIds.has(c.id));
        selectedIds.clear();
        render();
        updateBatchBar();
        closeConfirm();
        idsToDelete.forEach(id => remove(ref(db, `${userSalesPath}/${id}`)));
    };

    const executeAutoClean = () => {
        const seen = new Map();
        const toRemove = [];
        contacts = contacts.filter(c => {
            if (seen.has(c.phone)) {
                toRemove.push(c.id);
                return false;
            }
            seen.set(c.phone, true);
            return true;
        });
        render();
        closeConfirm();
        toRemove.forEach(id => remove(ref(db, `${userSalesPath}/${id}`)));
    };

    window.closeConfirm = () => document.getElementById('confirmOverlay').style.display = 'none';

    window.handleLockToggle = () => {
        if(isAdmin) {
            isAdmin = false;
            selectedIds.clear();
            document.getElementById('mainBody').classList.remove('unlocked-view');
            document.getElementById('lockTrigger').innerText = "UNLOCK";
            document.getElementById('lockBar').classList.remove('visible');
            document.getElementById('cleanBtn').style.display = 'none';
            render();
        } else {
            document.getElementById('lockBar').classList.toggle('visible');
        }
    };

    window.checkPin = () => {
        if (document.getElementById('masterPin').value === "1234") {
            isAdmin = true;
            document.getElementById('mainBody').classList.add('unlocked-view');
            document.getElementById('lockTrigger').innerText = "LOCK";
            document.getElementById('lockBar').classList.remove('visible');
            document.getElementById('cleanBtn').style.display = 'block';
            document.getElementById('masterPin').value = "";
            render();
        }
    };

    window.processEntry = () => {
        const name = document.getElementById('sheetName').value.trim();
        const phone = document.getElementById('sheetPhone').value.trim();
        if (!name || !phone) return;
        
        const id = currentEditId || phone.replace(/[^0-9]/g, "");
        const newContact = { id, name, phone, ts: Date.now() };

        if(currentEditId) {
            contacts = contacts.map(c => c.id === id ? newContact : c);
        } else {
            contacts.unshift(newContact);
        }

        render();
        closeSheets();

        set(ref(db, `${userSalesPath}/${id}`), { 
            customer: name, mpesa: phone, timestamp: Date.now(), payment: 'Cash'
        });
    };

    window.openAdd = () => {
        currentEditId = null;
        document.getElementById('sheetTitle').innerText = "New Registration";
        document.getElementById('sheetName').value = "";
        document.getElementById('sheetPhone').value = "";
        document.getElementById('sheetOverlay').style.display = 'flex';
    };

    window.openEdit = (id, name, phone) => {
        currentEditId = id;
        document.getElementById('sheetTitle').innerText = "Edit Details";
        document.getElementById('sheetName').value = name;
        document.getElementById('sheetPhone').value = phone;
        document.getElementById('sheetOverlay').style.display = 'flex';
    };

    window.closeSheets = () => document.getElementById('sheetOverlay').style.display = 'none';
    
    window.filter = () => {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.contact-row').forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    };
</script>
</body>
</html>
