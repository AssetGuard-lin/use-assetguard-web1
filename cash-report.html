<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Cash Audit - AssetGuard Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #001A35; --accent: #0072CE; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --bg: #f4f6f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); margin: 0; color: #1f2937; line-height: 1.2; }

        .sticky-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0; padding: 12px;
            display: grid; grid-template-columns: 40px 1fr; align-items: center;
        }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stat-pill { text-align: right; }
        .stat-pill label { font-size: 8px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; }
        .stat-pill span { font-size: 14px; font-weight: 800; color: var(--primary); }

        .filter-row { display: flex; gap: 8px; }
        select { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 12px; font-weight: 700; background: #fff; }

        .scroll-container { padding: 12px; padding-bottom: 80px; }
        .entry-card {
            background: white; padding: 15px; border-radius: 14px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #cbd5e1; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .entry-card.in { border-left-color: var(--success); }
        .entry-card.out { border-left-color: var(--danger); }
        .entry-card.pending { border-left-style: dashed; border-left-color: var(--warning); background: #fffcf0; }

        .entry-info { display: flex; flex-direction: column; gap: 3px; }
        .entry-cat { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .entry-name { font-size: 14px; font-weight: 700; }
        .entry-meta { font-size: 10px; color: #64748b; }

        .entry-val { text-align: right; }
        .val-amt { font-size: 15px; font-weight: 800; display: block; }
        .val-type { font-size: 8px; font-weight: 700; opacity: 0.6; }

        .admin-btn { background: #fee2e2; color: var(--danger); border: none; padding: 5px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; margin-top: 8px; cursor: pointer; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .pin-input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 24px; text-align: center; letter-spacing: 8px; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

<div id="app-content" style="display:none;">
    <div class="sticky-nav">
        <div onclick="toggleAdmin()"><span id="lock-icon" style="font-size: 20px;">🔒</span></div>
        <div>
            <div class="stat-row">
                <span style="font-weight: 800; font-size: 12px; color: var(--accent);">CASH AUDIT</span>
                <div style="display: flex; gap: 12px;">
                    <div class="stat-pill"><label>In</label><span id="total-in">0</span></div>
                    <div class="stat-pill"><label>Out</label><span id="total-out">0</span></div>
                    <div class="stat-pill"><label>Net</label><span id="net-cash" style="color:var(--accent)">0</span></div>
                </div>
            </div>
            <div class="filter-row">
                <select id="fMonth" onchange="filterAndRender()"></select>
                <select id="fYear" onchange="filterAndRender()"></select>
            </div>
        </div>
    </div>

    <div class="scroll-container">
        <div id="cardList"></div>
    </div>
</div>

<div id="auth-error" style="display:none; text-align:center; padding-top:50px;">
    <h3>Access Denied</h3>
    <p>Please log in to view the Cash Audit.</p>
</div>

<div id="pinModal" class="overlay">
    <div class="modal">
        <h3 style="margin:0 0 10px 0;">Admin Access</h3>
        <input type="password" id="adminPin" class="pin-input" placeholder="••••" maxlength="4" oninput="verifyPin()">
        <button style="border:none; background:none; color:#94a3b8; font-weight:600;" onclick="closeModals()">CANCEL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const db = getDatabase(initializeApp({
        databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com"
    }));

    // --- USER ISOLATION CONFIG ---
    const currentUID = localStorage.getItem("ag_active_uid");
    const queueKey = `ag_sales_queue_${currentUID}`;
    const mirrorKey = `ag_cash_audit_mirror_${currentUID}`;

    if (!currentUID) {
        document.getElementById('auth-error').style.display = 'block';
    } else {
        document.getElementById('app-content').style.display = 'block';
    }

    let isAdmin = false;
    let cloudRecords = [];
    let combinedRecords = [];

    // --- 1. UNIFIED MIRROR ENGINE (USER ISOLATED) ---
    const refreshUnifiedData = () => {
        const syncQueue = JSON.parse(localStorage.getItem(queueKey)) || [];
        const pendingSales = syncQueue
            .filter(q => q.payment === 'Cash')
            .map(q => ({
                id: q.saleId,
                date: q.timestamp,
                cat: 'SALE',
                type: 'IN',
                sub: (q.customer || "Walk-in") + " (PENDING SYNC)",
                amt: q.items ? q.items.reduce((sum, i) => sum + parseFloat(i.total || 0), 0) : parseFloat(q.total || 0),
                isPending: true
            }));

        const cloudIds = new Set(cloudRecords.map(r => r.id));
        const allPending = pendingSales.filter(p => !cloudIds.has(p.id));

        combinedRecords = [...allPending, ...cloudRecords].sort((a,b) => new Date(b.date) - new Date(a.date));
        
        localStorage.setItem(mirrorKey, JSON.stringify(combinedRecords));
        filterAndRender();
    };

    // Listen to User-Specific Firebase Node
    if (currentUID) {
        onValue(ref(db, `users/${currentUID}`), (snap) => {
            const data = snap.val() || {};
            let temp = [];
            
            const process = (obj, type, cat, pathSuffix) => {
                if(!obj) return;
                Object.entries(obj).forEach(([id, d]) => {
                    if(cat === 'SALE' && d.payment !== 'Cash') return;
                    
                    let val = parseFloat(d.total || d.amount || 0);
                    if (!val && d.items) val = d.items.reduce((sum, i) => sum + parseFloat(i.total || 0), 0);

                    temp.push({ 
                        id, date: d.timestamp || d.expense_date, cat, type, 
                        sub: d.customer || d.category || d.supplier || "General", 
                        amt: val, path: `users/${currentUID}/${pathSuffix}/${id}`, isPending: false
                    });
                });
            };

            process(data.sales, 'IN', 'SALE', 'sales');
            process(data.expenses, 'OUT', 'EXPENSE', 'expenses');
            process(data.purchases, 'OUT', 'PURCHASE', 'purchases');

            cloudRecords = temp;
            refreshUnifiedData();
        });
    }

    window.filterAndRender = () => {
        const m = document.getElementById('fMonth').value;
        const y = document.getElementById('fYear').value;
        const list = document.getElementById('cardList');
        list.innerHTML = '';
        let tin = 0, tout = 0;

        combinedRecords.forEach(r => {
            const dt = new Date(r.date);
            if(dt.getMonth().toString() !== m || dt.getFullYear().toString() !== y) return;
            
            if(r.type==='IN') tin += r.amt; else tout += r.amt;

            list.innerHTML += `
                <div class="entry-card ${r.type.toLowerCase()} ${r.isPending ? 'pending' : ''}">
                    <div class="entry-info">
                        <span class="entry-cat">${r.cat} ${r.isPending ? '⏳' : ''}</span>
                        <span class="entry-name">${r.sub}</span>
                        <span class="entry-meta">${dt.toLocaleDateString('en-GB')} • ${dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${isAdmin && !r.isPending ? `<button class="admin-btn" onclick="deleteEntry('${r.path}')">DELETE</button>` : ''}
                    </div>
                    <div class="entry-val" style="color:var(--${r.type==='IN'?'success':'danger'})">
                        <span class="val-amt">${r.type==='IN'?'+':'-'}${r.amt.toLocaleString()}</span>
                        <span class="val-type">CASH ${r.type}</span>
                    </div>
                </div>`;
        });

        document.getElementById('total-in').innerText = tin.toLocaleString();
        document.getElementById('total-out').innerText = tout.toLocaleString();
        document.getElementById('net-cash').innerText = (tin - tout).toLocaleString();
    };

    window.addEventListener('storage', (e) => {
        if(e.key === queueKey) refreshUnifiedData();
    });

    // --- SECURITY ---
    window.toggleAdmin = () => {
        if(isAdmin) { isAdmin = false; document.getElementById('lock-icon').innerText = "🔒"; filterAndRender(); }
        else { document.getElementById('pinModal').style.display = 'flex'; document.getElementById('adminPin').focus(); }
    };
    window.verifyPin = () => {
        if(document.getElementById('adminPin').value === "1234") {
            isAdmin = true; document.getElementById('lock-icon').innerText = "🔓";
            closeModals(); filterAndRender();
        }
    };
    window.closeModals = () => { document.getElementById('pinModal').style.display = 'none'; document.getElementById('adminPin').value = ''; };
    window.deleteEntry = async (path) => { if(confirm("Permanently remove this cash record?")) { await remove(ref(db, path)); } };

    // Init Filters
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const now = new Date();
    document.getElementById('fMonth').innerHTML = months.map((m, i) => `<option value="${i}" ${i===now.getMonth()?'selected':''}>${m}</option>`).join('');
    document.getElementById('fYear').innerHTML = [2024, 2025, 2026].map(y => `<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}</option>`).join('');
</script>
</body>
</html>
