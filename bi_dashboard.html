<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetGuard Ultimate BI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #002E5D; --accent: #0072CE; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --bg: #f1f5f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        
        .header { 
            background: var(--primary); color: white; padding: 15px; border-radius: 12px; 
            margin-bottom: 8px; display: grid; grid-template-columns: 50px 1fr auto; 
            align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .header-title { font-weight: 800; font-size: 13px; letter-spacing: 0.5px; }
        
        .filter-bar { display: flex; gap: 5px; margin-bottom: 12px; padding: 0 5px; overflow-x: auto; scrollbar-width: none; }
        .f-btn { 
            background: white; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 20px; 
            font-size: 10px; font-weight: 800; color: #64748b; white-space: nowrap; cursor: pointer;
        }
        .f-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .banner { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .tax-banner { border-left: 5px solid var(--danger); background: #fff1f2; }

        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: white; padding: 15px; border-radius: 16px; border-left: 4px solid var(--accent); }
        .kpi-card span { font-size: 9px; text-transform: uppercase; color: #64748b; font-weight: 700; display: block; }
        .kpi-card div { font-size: 16px; font-weight: 800; margin-top: 4px; color: var(--primary); }

        .card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .chart-wrap { position: relative; height: 160px; width: 100%; }

        .section-title { font-size: 11px; font-weight: 800; color: var(--primary); margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .debt-row { display: flex; justify-content: space-between; padding: 12px; border-radius: 12px; margin-bottom: 8px; background: #f8fafc; font-size: 12px; border: 1px solid #e2e8f0; border-left: 4px solid var(--warning); }
        
        .history-item { border-bottom: 1px solid #f1f5f9; padding: 10px 0; }
        .item-tag { font-size: 10px; color: #64748b; display: block; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <div style="width:50px"></div>
        <div class="header-title">ASSETGUARD <span style="color:var(--accent)">ULTIMATE</span></div>
        <div id="clock" style="font-size: 9px; opacity: 0.8;">00:00:00</div>
    </div>

    <div class="filter-bar">
        <div class="f-btn active" onclick="setFilter('today', this)">TODAY</div>
        <div class="f-btn" onclick="setFilter('7days', this)">7 DAYS</div>
        <div class="f-btn" onclick="setFilter('30days', this)">30 DAYS</div>
        <div class="f-btn" onclick="setFilter('all', this)">ALL TIME</div>
    </div>

    <div class="banner tax-banner">
        <div><b>VAT LIABILITY (KRA)</b><br><span id="vat-total">KES 0</span></div>
        <div style="text-align:right"><b id="tax-days" style="color:var(--danger)">Calculating...</b></div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card" style="border-color: var(--success)"><span>Net Revenue</span><div id="profit">0</div></div>
        <div class="kpi-card" style="border-color: var(--warning)"><span>Total Debt</span><div id="debt">0</div></div>
        <div class="kpi-card"><span>Expenses</span><div id="exp">0</div></div>
        <div class="kpi-card" style="border-color: #8b5cf6"><span>Stock Value</span><div id="stock">0</div></div>
    </div>

    <div class="section-title"> Revenue Performance</div>
    <div class="card"><div class="chart-wrap"><canvas id="pnlChart"></canvas></div></div>

    <div class="section-title"> Active Debtors (All)</div>
    <div class="card" id="debt-list"></div>

    <div class="section-title">🕒 Recent Activity</div>
    <div class="card" id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com" }));
    const currentUID = localStorage.getItem("ag_active_uid");

    let currentFilter = 'today';
    let rawData = {};

    const pnlChart = new Chart(document.getElementById('pnlChart'), {
        type: 'bar', options: { maintainAspectRatio: false, plugins: { legend: { display: false } } },
        data: { labels: ['Sales', 'Expenses'], datasets: [{ backgroundColor: ['#0072CE','#ef4444'], data: [0,0] }] }
    });

    if (currentUID) {
        onValue(ref(db, `users/${currentUID}`), (snap) => {
            rawData = snap.val() || {};
            renderBI();
        });
    }

    window.setFilter = (type, btn) => {
        currentFilter = type;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderBI();
    };

    function renderBI() {
        const sales = Object.values(rawData.sales || {});
        const exps = Object.values(rawData.expenses || {});
        const inventory = Object.values(rawData.inventory || {});
        const now = new Date();

        let metrics = { rev: 0, exp: 0, totalDebt: 0, vat: 0, stock: 0 };
        let debtHtml = "";
        let history = [];

        // 1. Process Sales & Debt (All Debtors)
        sales.forEach(s => {
            const sDate = new Date(s.timestamp);
            const diffDays = (now - sDate) / 864e5;
            
            const total = s.items ? s.items.reduce((acc, i) => acc + (parseFloat(i.total) || 0), 0) : (parseFloat(s.total) || 0);
            const paid = s.payments ? Object.values(s.payments).reduce((acc, p) => acc + (parseFloat(p.amount) || 0), 0) : 0;
            const balance = total - paid;

            let inRange = false;
            if (currentFilter === 'today' && sDate.toLocaleDateString() === now.toLocaleDateString()) inRange = true;
            else if (currentFilter === '7days' && diffDays <= 7) inRange = true;
            else if (currentFilter === '30days' && diffDays <= 30) inRange = true;
            else if (currentFilter === 'all') inRange = true;

            if (inRange) {
                metrics.rev += total;
                metrics.vat += (total * 0.16) / 1.16;
                history.push(s);
            }

            // SHOW ALL DEBTS: If payment is Credit and balance > 0 (No time restriction)
            if (s.payment === 'Credit' && balance > 0) {
                metrics.totalDebt += balance;
                debtHtml += `
                    <div class="debt-row">
                        <div><b>${s.customer || 'Customer'}</b><br><small>${sDate.toLocaleDateString()}</small></div>
                        <div style="text-align:right"><b>KES ${balance.toLocaleString()}</b></div>
                    </div>`;
            }
        });

        // 2. Process Expenses
        exps.forEach(e => {
            const eDate = new Date(e.expense_date);
            const diffDays = (now - eDate) / 864e5;
            let inRange = false;
            if (currentFilter === 'today' && eDate.toLocaleDateString() === now.toLocaleDateString()) inRange = true;
            else if (currentFilter === '7days' && diffDays <= 7) inRange = true;
            else if (currentFilter === '30days' && diffDays <= 30) inRange = true;
            else if (currentFilter === 'all') inRange = true;

            if (inRange) metrics.exp += (parseFloat(e.amount) || 0);
        });

        // 3. Stock Value (Qty * Sale Price)
        inventory.forEach(i => {
            const qty = parseFloat(i.qty || i.stock || 0);
            const price = parseFloat(i.salePrice || i.price || 0);
            metrics.stock += (qty * price);
        });

        // 4. Update UI
        document.getElementById('profit').innerText = metrics.rev.toLocaleString();
        document.getElementById('debt').innerText = metrics.totalDebt.toLocaleString();
        document.getElementById('exp').innerText = metrics.exp.toLocaleString();
        document.getElementById('stock').innerText = metrics.stock.toLocaleString();
        document.getElementById('vat-total').innerText = "KES " + Math.floor(metrics.vat).toLocaleString();

        let deadline = new Date(now.getFullYear(), now.getMonth(), 20);
        if (now.getDate() > 20) deadline = new Date(now.getFullYear(), now.getMonth() + 1, 20);
        document.getElementById('tax-days').innerText = `${Math.ceil((deadline - now) / 864e5)} Days Left`;

        pnlChart.data.datasets[0].data = [metrics.rev, metrics.exp];
        pnlChart.update();

        const sorted = history.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).slice(0, 5);
        document.getElementById('history-list').innerHTML = sorted.map(s => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <b>${s.customer || 'Walk-in'}</b>
                    <span style="color:var(--success); font-weight:800;">+${(s.items ? s.items.reduce((acc, i) => acc + parseFloat(i.total), 0) : s.total).toLocaleString()}</span>
                </div>
                <span class="item-tag">${s.payment} Sale • ${new Date(s.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
            </div>`).join('') || '<p style="text-align:center; font-size:12px; color:#94a3b8;">No recent records.</p>';

        document.getElementById('debt-list').innerHTML = debtHtml || '<p style="text-align:center; font-size:12px; color:var(--success);">No outstanding debts. </p>';
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
