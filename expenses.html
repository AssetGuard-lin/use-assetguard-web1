<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Expense Entry - AssetGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#0072CE; --dark:#001A35; --bg:#f0f2f5; --accent:#e06b3f; --success:#22c55e; --spine: #FFD700; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1f2937; -webkit-tap-highlight-color: transparent; }
        
        .top-nav { position: sticky; top: 0; z-index: 1000; background: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .nav-brand { font-weight: 800; font-size: 14px; color: var(--dark); }
        .history-btn { background: var(--dark); color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .ledger-card { background: white; padding: 25px 25px 25px 35px; border-radius: 8px 16px 16px 8px; box-shadow: 10px 10px 25px rgba(0,0,0,0.1); border: 1px solid #edf2f7; position: relative; }
        .ledger-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 12px; background: var(--spine); box-shadow: inset -2px 0 5px rgba(0,0,0,0.1); }
        
        .input-group { margin-bottom: 18px; }
        label { font-weight: 700; display: block; margin-bottom: 6px; color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; background: #fafafa; outline: none; font-family: inherit; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: white; }
        
        #manualCategoryGroup { display: none; margin-top: 10px; }

        .btn-submit { background: var(--dark); color: white; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-transform: uppercase; margin-top: 10px; }
        .btn-submit:active { transform: scale(0.97); }

        .status-pill { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 20px; text-transform: uppercase; }
        .status-offline { background: #fee2e2; color: #ef4444; }
        .status-online { background: #dcfce7; color: #16a34a; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-brand"> <span id="onlineLabel" class="status-pill status-offline">Checking...</span></div>
        <a href="expenses_history.html" class="history-btn">VIEW HISTORY</a>
    </div>

    <div class="container" id="appContent">
        <div class="ledger-card">
            <h2 style="margin:0 0 20px 0; font-weight:800; font-size: 24px;">New Entry</h2>
            <form id="expenseForm">
                
                <div class="input-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="expense_date" required>
                </div>

                <div class="input-group">
                    <label>Expense Name</label>
                    <input type="text" id="expense_name" placeholder="What did you buy?" required>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <select id="category" onchange="toggleManualCategory()" required>
                        <option value="" disabled selected>Select category...</option>
                        <option value="Rent">Rent & Utilities</option>
                        <option value="Supplies">Supplies</option>
                        <option value="Transport">Transport</option>
                        <option value="Marketing">Marketing</option>
                        <option value="MANUAL">-- Type Custom Category --</option>
                    </select>
                    <div id="manualCategoryGroup">
                        <input type="text" id="manual_category_input" placeholder="Type category name here...">
                    </div>
                </div>

                <div class="input-group">
                    <label>Amount (KES)</label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Save Entry</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://assetguard-c8c8c-default-rtdb.firebaseio.com" }));

        // --- USER ISOLATION ---
        const currentUID = localStorage.getItem("ag_active_uid");
        if (!currentUID) {
            document.getElementById('appContent').innerHTML = "<h2 style='text-align:center; padding-top:50px;'>Authentication Required.</h2>";
        }

        const cloudPath = `users/${currentUID}/expenses`;
        let iDB;

        // 1. DATABASE SETUP (Isolate IndexedDB per user)
        const initIDB = () => {
            const request = indexedDB.open(`AssetGuard_Mirror_${currentUID}`, 1);
            request.onsuccess = (e) => { iDB = e.target.result; syncToCloud(); };
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("expenses")) {
                    db.createObjectStore("expenses", { keyPath: "id" });
                }
            };
        };
        initIDB();

        // 2. AUTO-SET TIME
        const refreshTime = () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('expense_date').value = now.toISOString().slice(0, 16);
        };
        refreshTime();

        // 3. CATEGORY TOGGLE
        window.toggleManualCategory = () => {
            const sel = document.getElementById('category').value;
            document.getElementById('manualCategoryGroup').style.display = (sel === "MANUAL") ? "block" : "none";
        };

        // 4. STATUS HANDLER
        const updateStatus = () => {
            const el = document.getElementById('onlineLabel');
            if(navigator.onLine) {
                el.innerText = "ONLINE";
                el.className = "status-pill status-online";
                syncToCloud();
            } else {
                el.innerText = "Offline Mode (Saved to Disk)";
                el.className = "status-pill status-offline";
            }
        };
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();

        // 5. SAVE HANDLER
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let finalCategory = document.getElementById('category').value;
            if (finalCategory === "MANUAL") {
                finalCategory = document.getElementById('manual_category_input').value || "Other";
            }

            const expenseId = "exp_" + Date.now();
            const data = {
                id: expenseId,
                expense_name: document.getElementById('expense_name').value,
                category: finalCategory,
                amount: document.getElementById('amount').value,
                expense_date: document.getElementById('expense_date').value,
                timestamp: Date.now(),
                synced: false
            };

            const tx = iDB.transaction("expenses", "readwrite");
            tx.objectStore("expenses").put(data);

            tx.oncomplete = () => {
                const btn = document.getElementById('submitBtn');
                btn.innerText = "SAVED TO MIRROR ✓";
                btn.style.background = "#22c55e";
                
                document.getElementById('expenseForm').reset();
                document.getElementById('manualCategoryGroup').style.display = "none";
                refreshTime();

                setTimeout(() => { 
                    btn.innerText = "Save Entry"; 
                    btn.style.background = "#001A35";
                }, 1500);

                syncToCloud();
            };
        });

        // 6. SYNC ENGINE (Isolated to User Path)
        async function syncToCloud() {
            if (!navigator.onLine || !iDB || !currentUID) return;
            const tx = iDB.transaction("expenses", "readonly");
            const request = tx.objectStore("expenses").getAll();
            
            request.onsuccess = () => {
                request.result.filter(item => !item.synced).forEach(async (item) => {
                    try {
                        await set(ref(db, `${cloudPath}/${item.id}`), {
                            expense_name: item.expense_name,
                            category: item.category,
                            amount: item.amount,
                            expense_date: item.expense_date,
                            timestamp: item.timestamp
                        });
                        
                        const updateTx = iDB.transaction("expenses", "readwrite");
                        item.synced = true;
                        updateTx.objectStore("expenses").put(item);
                    } catch (err) {
                        console.error("Sync failed:", err);
                    }
                });
            };
        }
    </script>
</body>
</html>
